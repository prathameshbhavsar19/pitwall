name: PitWall CI — Eval Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Qdrant to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:6333/readiness; then
              echo "Qdrant is ready"
              break
            fi
            echo "Waiting for Qdrant... ($i)"
            sleep 2
          done

      - name: Ingest corpus into Qdrant
        run: |
          python ingest/ingest.py
          python ingest/embed.py
          python ingest/qdrant_ingest.py
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

      - name: Run pytest
        run: pytest tests/test_api.py -v
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}

  ragas-eval:
    runs-on: ubuntu-latest
    needs: pytest
    if: github.event_name == 'pull_request'

    services:
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Qdrant to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:6333/readiness; then
              echo "Qdrant is ready"
              break
            fi
            echo "Waiting for Qdrant... ($i)"
            sleep 2
          done

      - name: Re-ingest corpus into Qdrant
        run: |
          python ingest/ingest.py
          python ingest/embed.py
          python ingest/qdrant_ingest.py
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}

      - name: Start API server
        run: |
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
          curl -f http://localhost:8000/health
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}

      - name: Run RAGAS eval gate
        run: python eval/ragas_eval.py
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}

      - name: Check thresholds — fail PR if metrics regress
        run: |
          python - << 'PYEOF'
          import json, sys

          with open("eval/ragas_results.json") as f:
              r = json.load(f)

          cp = r["context_precision"]
          ff = r["faithfulness"]
          ar = r["answer_relevancy"]

          print(f"Context Precision : {cp:.4f}")
          print(f"Faithfulness      : {ff:.4f}")
          print(f"Answer Relevancy  : {ar:.4f}")

          failed = []
          if cp < 0.70: failed.append(f"context_precision {cp:.4f} < 0.70")
          if ff < 0.75: failed.append(f"faithfulness {ff:.4f} < 0.75")
          if ar < 0.70: failed.append(f"answer_relevancy {ar:.4f} < 0.70")

          if failed:
              print("\n❌ EVAL GATE FAILED:")
              for f in failed:
                  print(f"   {f}")
              sys.exit(1)
          else:
              print("\n✅ All metrics passed.")
          PYEOF